[command]
name = "unblock"
binary_path = ["unblock"]
description = "Unblock a domain or category"
requires_config = true
requires_api = true
requires_pin = false

[[args]]
name = "target"
type = "string"
required = true

[[flags]]
name = "--duration"
type = "string"
required = false
description = "How long to unblock (e.g. 1h, 30m, 2h30m)"
short = "-d"

[output.success]
schema = """
{
  "ok": true,
  "command": "unblock",
  "data": {
    "target": "example.com",
    "duration": "1h",
    "pending_id": "uuid",
    "watchdog_warning": null,
    "apps_unblocked": [],
    "android_unblocked": []
  },
  "summary": {
    "unblocked": 1,
    "apps_unblocked": 0,
    "android_unblocked": 0
  },
  "timestamp": "..."
}
"""

[[exit_codes]]
code = 0
name = "success"

[[exit_codes]]
code = 7
name = "not_found"

[[side_effects]]
target = "nextdns_api"
operation = "DELETE /profiles/{id}/denylist/{domain}"

[[examples]]
description = "Unblock permanently"
input = "ndb unblock example.com"
exit_code = 0

[[examples]]
description = "Unblock for 1 hour (auto re-blocks)"
input = "ndb unblock example.com --duration 1h"
exit_code = 0
