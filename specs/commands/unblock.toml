[command]
name = "unblock"
binary_path = ["unblock"]
description = "Temporarily unblock a domain or category"
requires_config = true
requires_api = true
requires_pin = false

[[args]]
name = "target"
type = "string"
required = true

[[flags]]
name = "--duration"
type = "string"
required = false
description = "How long to unblock (e.g. 1h, 30m, 2h30m)"

[[flags]]
name = "--pin"
type = "string"
required = false
description = "PIN for protected domains"

[output.success]
schema = """
{
  "ok": true,
  "command": "unblock",
  "data": {
    "target": "example.com",
    "unblocked_until": "2026-03-05T19:00:00Z"
  },
  "summary": { "unblocked": 1 },
  "timestamp": "..."
}
"""

[output.error]
schema = """
{
  "ok": false,
  "command": "unblock",
  "error": { "code": "permission_error", "message": "PIN required for protected domain", "hint": "Provide --pin flag" },
  "exit_code": 5
}
"""

[[exit_codes]]
code = 0
name = "success"

[[exit_codes]]
code = 5
name = "permission_error"

[[exit_codes]]
code = 7
name = "not_found"

[[side_effects]]
target = "nextdns_api"
operation = "DELETE /profiles/{id}/denylist/{domain}"

[[examples]]
description = "Unblock for 1 hour"
input = "ndb unblock example.com --duration 1h"
exit_code = 0

[[examples]]
description = "Unblock protected domain"
input = "ndb unblock example.com --duration 30m --pin 1234"
exit_code = 0
