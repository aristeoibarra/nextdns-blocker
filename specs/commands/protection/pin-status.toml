[command]
name = "protection pin-status"
binary_path = ["protection", "pin-status"]
description = "Check whether a PIN is currently set"
requires_config = false
requires_api = false
requires_pin = false

[output.success]
schema = """
{
  "ok": true,
  "command": "protection pin-status",
  "data": { "pin_enabled": true },
  "timestamp": "..."
}
"""

[[exit_codes]]
code = 0
name = "success"

[[examples]]
description = "Check PIN status"
input = "ndb protection pin-status"
exit_code = 0
