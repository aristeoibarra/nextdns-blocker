[command]
name = "protection pin-set"
binary_path = ["protection", "pin-set"]
description = "Set or update the protection PIN"
requires_config = false
requires_api = false
requires_pin = false

[[flags]]
name = "--pin"
type = "string"
required = false
description = "Current PIN (required if PIN already set)"

[output.success]
schema = """
{
  "ok": true,
  "command": "protection pin-set",
  "data": { "pin_enabled": true },
  "summary": { "updated": 1 },
  "timestamp": "..."
}
"""

[[exit_codes]]
code = 0
name = "success"

[[exit_codes]]
code = 5
name = "permission_error"

[[exit_codes]]
code = 4
name = "validation_error"

[[examples]]
description = "Set a new PIN"
input = "ndb protection pin-set"
exit_code = 0

[[examples]]
description = "Update PIN with existing PIN"
input = "ndb protection pin-set --pin 1234"
exit_code = 0
