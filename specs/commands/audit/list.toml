[command]
name = "audit list"
binary_path = ["audit", "list"]
description = "List recent audit log entries"
requires_config = false
requires_api = false
requires_pin = false

[[flags]]
name = "--limit"
type = "string"
required = false
description = "Maximum entries to return"
short = "-l"

[[flags]]
name = "--offset"
type = "string"
required = false
description = "Number of entries to skip"

[[flags]]
name = "--domain"
type = "string"
required = false
description = "Filter by domain (searches target_id and details)"
short = "-d"

[[flags]]
name = "--action"
type = "string"
required = false
description = "Filter by action (e.g., block, unblock, enforce_failed)"
short = "-a"

[[flags]]
name = "--source"
type = "string"
required = false
description = "Filter by source (cli, schedule, watchdog, preflight, pending, retry, system)"
short = "-s"

[output.success]
schema = """
{
  "ok": true,
  "command": "audit list",
  "data": {
    "entries": []
  },
  "summary": { "returned": 0, "total": 0 },
  "timestamp": "..."
}
"""

[[exit_codes]]
code = 0
name = "success"

[[examples]]
description = "List recent audit entries"
input = "ndb audit list"
exit_code = 0

[[examples]]
description = "List last 10 entries"
input = "ndb audit list --limit 10"
exit_code = 0

[[examples]]
description = "Filter by domain"
input = "ndb audit list --domain whatsapp.com"
exit_code = 0

[[examples]]
description = "Filter by source"
input = "ndb audit list --source schedule"
exit_code = 0

[[examples]]
description = "Filter by action"
input = "ndb audit list --action enforce_failed"
exit_code = 0
