[command]
name = "category delete"
binary_path = ["category", "delete"]
description = "Delete a domain category"
requires_config = false
requires_api = false
requires_pin = false

[[args]]
name = "name"
type = "string"
required = true

[output.success]
schema = """
{
  "ok": true,
  "command": "category delete",
  "data": { "name": "social-media" },
  "summary": { "deleted": 1 },
  "timestamp": "..."
}
"""

[[exit_codes]]
code = 0
name = "success"

[[exit_codes]]
code = 7
name = "not_found"

[[examples]]
description = "Delete a category"
input = "ndb category delete social-media"
exit_code = 0
