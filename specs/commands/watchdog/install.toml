[command]
name = "watchdog install"
binary_path = ["watchdog", "install"]
description = "Install the watchdog service for automatic sync and pending actions"
requires_config = true
requires_api = false
requires_pin = false

[output.success]
schema = """
{
  "ok": true,
  "command": "watchdog install",
  "data": { "path": "/path/to/plist", "interval_secs": 300, "scheduler": "launchd" },
  "timestamp": "..."
}
"""

[[exit_codes]]
code = 0
name = "success"

[[exit_codes]]
code = 6
name = "conflict_error"

[[examples]]
description = "Install watchdog service"
input = "ndb watchdog install --interval 5m"
exit_code = 0
