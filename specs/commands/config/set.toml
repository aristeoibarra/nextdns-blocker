[command]
name = "config set"
binary_path = ["config", "set"]
description = "Set a configuration value in the database"
requires_config = true
requires_api = false
requires_pin = false

[[args]]
name = "key"
type = "string"
required = true

[[args]]
name = "value"
type = "string"
required = true

[output.success]
schema = """
{
  "ok": true,
  "command": "config set",
  "data": { "key": "timezone", "value": "America/Mexico_City", "previous": "UTC" },
  "timestamp": "..."
}
"""

[[exit_codes]]
code = 0
name = "success"

[[exit_codes]]
code = 4
name = "validation_error"

[[exit_codes]]
code = 2
name = "config_error"

[[examples]]
description = "Set timezone"
input = "ndb config set timezone America/Mexico_City"
exit_code = 0
