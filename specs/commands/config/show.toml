[command]
name = "config show"
binary_path = ["config", "show"]
description = "Show current configuration values from database"
requires_config = true
requires_api = false
requires_pin = false

[output.success]
schema = """
{
  "ok": true,
  "command": "config show",
  "data": {
    "settings": {
      "timezone": "UTC",
      "safe_search": "true",
      "youtube_restricted_mode": "false",
      "block_bypass": "true"
    },
    "db_path": "/path/to/ndb.db"
  },
  "timestamp": "..."
}
"""

[[exit_codes]]
code = 0
name = "success"

[[exit_codes]]
code = 2
name = "config_error"

[[examples]]
description = "Show current config"
input = "ndb config show"
exit_code = 0
