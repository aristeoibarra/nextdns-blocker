[command]
name = "config remove-secret"
binary_path = ["config", "remove-secret"]
description = "Remove a secret from macOS Keychain"
requires_config = false
requires_api = false
requires_pin = false

[[args]]
name = "name"
type = "string"
required = true
description = "Secret name (api-key or profile-id)"

[output.success]
schema = """
{
  "ok": true,
  "command": "config remove-secret",
  "data": { "name": "api-key", "removed": true },
  "timestamp": "..."
}
"""

[[exit_codes]]
code = 0
name = "success"

[[exit_codes]]
code = 7
name = "not_found"

[[examples]]
description = "Remove API key from Keychain"
input = "ndb config remove-secret api-key"
exit_code = 0
