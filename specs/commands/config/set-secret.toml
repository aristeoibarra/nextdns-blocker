[command]
name = "config set-secret"
binary_path = ["config", "set-secret"]
description = "Store a secret in .env file"
requires_config = false
requires_api = false
requires_pin = false

[[args]]
name = "name"
type = "string"
required = true
description = "Secret name (api-key or profile-id)"

[[args]]
name = "value"
type = "string"
required = true
description = "Secret value"

[output.success]
schema = """
{
  "ok": true,
  "command": "config set-secret",
  "data": { "name": "api-key", "stored_in": "..." },
  "timestamp": "..."
}
"""

[[exit_codes]]
code = 0
name = "success"

[[exit_codes]]
code = 4
name = "validation_error"

[[examples]]
description = "Store API key"
input = "ndb config set-secret api-key mykey123"
exit_code = 0
