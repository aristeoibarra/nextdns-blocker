[command]
name = "config validate"
binary_path = ["config", "validate"]
description = "Validate the current configuration in database"
requires_config = true
requires_api = false
requires_pin = false

[output.success]
schema = """
{
  "ok": true,
  "command": "config validate",
  "data": { "valid": true, "errors": [] },
  "timestamp": "..."
}
"""

[output.error]
schema = """
{
  "ok": false,
  "command": "config validate",
  "error": { "code": "config_error", "message": "Configuration is invalid", "hint": "Run 'ndb config set' to fix issues" },
  "exit_code": 2
}
"""

[[exit_codes]]
code = 0
name = "success"

[[exit_codes]]
code = 4
name = "validation_error"

[[examples]]
description = "Validate config"
input = "ndb config validate"
exit_code = 0
