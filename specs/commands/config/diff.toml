[command]
name = "config diff"
binary_path = ["config", "diff"]
description = "Show differences between local and remote configuration"
requires_config = true
requires_api = true
requires_pin = false

[output.success]
schema = """
{
  "ok": true,
  "command": "config diff",
  "data": {
    "denylist": { "local_only": ["new-site.com"], "remote_only": ["old-site.com"], "common": 10 },
    "allowlist": { "local_only": [], "remote_only": [], "common": 3 },
    "categories": { "local_only": [], "remote_only": [], "common": 0 },
    "services": { "local_only": ["tiktok"], "remote_only": [], "common": 2 }
  },
  "summary": { "in_sync": false, "differences": 3 },
  "timestamp": "..."
}
"""

[[exit_codes]]
code = 0
name = "success"

[[exit_codes]]
code = 2
name = "config_error"

[[exit_codes]]
code = 3
name = "api_error"

[[examples]]
description = "Show config diff"
input = "ndb config diff"
exit_code = 0
