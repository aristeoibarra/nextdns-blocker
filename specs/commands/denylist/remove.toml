[command]
name = "denylist remove"
binary_path = ["denylist", "remove"]
description = "Remove domains from the denylist"
requires_config = false
requires_api = false
requires_pin = false

[[args]]
name = "domains"
type = "string[]"
required = true
validation = "rfc1123_domain"

[output.success]
schema = """
{
  "ok": true,
  "command": "denylist remove",
  "data": { "removed": ["example.com"], "not_found": [] },
  "summary": { "removed": 1, "not_found": 0 },
  "timestamp": "..."
}
"""

[[exit_codes]]
code = 0
name = "success"

[[examples]]
description = "Remove a domain"
input = "ndb denylist remove example.com"
exit_code = 0
