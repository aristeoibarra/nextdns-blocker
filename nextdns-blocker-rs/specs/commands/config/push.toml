[command]
name = "config push"
binary_path = ["config", "push"]
description = "Push local configuration to NextDNS API"
requires_config = true
requires_api = true
requires_pin = false

[[flags]]
name = "--dry-run"
type = "bool"
required = false
description = "Show what would be pushed without making changes"

[output.success]
schema = """
{
  "ok": true,
  "command": "config push",
  "data": {
    "changes": {
      "denylist": { "added": 2, "removed": 1 },
      "allowlist": { "added": 0, "removed": 0 },
      "categories": { "added": 0, "removed": 0 },
      "services": { "added": 1, "removed": 0 }
    }
  },
  "summary": { "total_changes": 4 },
  "timestamp": "..."
}
"""

[[exit_codes]]
code = 0
name = "success"

[[exit_codes]]
code = 2
name = "config_error"

[[exit_codes]]
code = 3
name = "api_error"

[[side_effects]]
target = "nextdns_api"
operation = "PUT /profiles/{id}/*"

[[examples]]
description = "Push config to API"
input = "ndb config push"
exit_code = 0

[[examples]]
description = "Dry run push"
input = "ndb config push --dry-run"
exit_code = 0
