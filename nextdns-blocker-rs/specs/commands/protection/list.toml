[command]
name = "protection list"
binary_path = ["protection", "list"]
description = "List all active unlocks and pending unlock requests"
requires_config = false
requires_api = false
requires_pin = false

[output.success]
schema = """
{
  "ok": true,
  "command": "protection list",
  "data": {
    "active_unlocks": [
      { "request_id": 1, "target": "example.com", "expires_at": "...", "reason": "..." }
    ],
    "pending_requests": [
      { "request_id": 2, "target": "other.com", "duration": "1h", "requested_at": "..." }
    ]
  },
  "summary": { "active": 1, "pending": 1 },
  "timestamp": "..."
}
"""

[[exit_codes]]
code = 0
name = "success"

[[examples]]
description = "List unlocks and requests"
input = "ndb protection list"
exit_code = 0
